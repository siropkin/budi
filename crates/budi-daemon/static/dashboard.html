<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>budi — AI Code Analytics</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
<link rel="stylesheet" href="/static/dashboard.css">
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="logo">&#x1f4ca;</span>
    <h1>budi</h1>
    <div class="page-tabs" role="tablist" aria-label="Dashboard pages">
      <button data-page="overview" class="active" role="tab" aria-selected="true">Overview</button>
      <button data-page="insights" role="tab" aria-selected="false">Insights</button>
      <button data-page="sessions" role="tab" aria-selected="false">Sessions</button>
      <button data-page="settings" role="tab" aria-selected="false">Settings</button>
    </div>
  </div>
  <div class="header-right">
    <div class="period-tabs" role="tablist" aria-label="Time period">
      <button data-period="today" class="active" role="tab" aria-selected="true">Today</button>
      <button data-period="week" role="tab" aria-selected="false">Week</button>
      <button data-period="month" role="tab" aria-selected="false">Month</button>
      <button data-period="all" role="tab" aria-selected="false">All</button>
    </div>
  </div>
</div>

<div id="content"><div class="loading">Loading analytics</div></div>

<script src="/static/dashboard.js"></script>
</body>
</html>
