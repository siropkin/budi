<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>budi — AI Code Analytics</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
<link rel="stylesheet" href="/static/dashboard.css">
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="logo">&#x1f4ca;</span>
    <h1>budi</h1>
  </div>
  <div class="header-right">
    <nav class="nav-tabs">
      <a href="/dashboard" data-view="stats" class="active">Stats</a>
      <a href="/dashboard/insights" data-view="insights">Insights</a>
      <a href="/dashboard/setup" data-view="setup">Setup</a>
      <a href="/dashboard/plans" data-view="plans">Plans</a>
      <a href="/dashboard/prompts" data-view="prompts">Prompts</a>
    </nav>
  </div>
</div>

<div class="period-bar" id="periodBar">
  <div class="period-tabs">
    <button data-period="today" class="active">Today</button>
    <button data-period="week">Week</button>
    <button data-period="month">Month</button>
    <button data-period="all">All</button>
  </div>
  <div class="provider-filter" id="providerFilter" style="display:none">
    <select id="providerSelect"><option value="">All Agents</option></select>
  </div>
  <button class="sync-btn" id="syncBtn" title="Sync JSONL transcripts">&#x21bb; Sync</button>
  <span class="last-synced" id="lastSynced"></span>
</div>

<div id="content"><div class="loading">Loading analytics</div></div>

<script src="/static/dashboard.js"></script>
</body>
</html>
