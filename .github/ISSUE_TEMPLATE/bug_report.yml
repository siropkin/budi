name: Bug report
description: Report a problem in budi
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug — what you did, what you expected, and what happened instead.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: "Output of: uname -s && budi --version"
      placeholder: |
        macOS / Linux
        budi 0.x.x
  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      description: Paste any relevant output, errors, or screenshots.
      render: shell
