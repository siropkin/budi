name: Bug report
description: Report a reproducible problem in budi
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: A clear and short description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Provide exact steps, commands, and inputs.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      description: Paste relevant command output, stack traces, or screenshots.
      render: shell
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, budi version, install method, and Rust/Node versions if relevant.
      placeholder: |
        - OS:
        - budi version:
        - Install method:
        - Rust:
        - Node:
    validations:
      required: true
