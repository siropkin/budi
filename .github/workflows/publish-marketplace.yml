name: Publish Marketplace

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Plugin version to publish (X.Y.Z)"
        required: true
        type: string
      base_branch:
        description: "Base branch for publish PR"
        required: false
        default: "main"
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: publish-marketplace-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      PUBLISH_TOKEN: ${{ secrets.MARKETPLACE_PUSH_TOKEN || secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ env.PUBLISH_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI and tools
        run: |
          npm install -g @anthropic-ai/claude-code
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Bump plugin and marketplace versions
        run: ./scripts/bump-plugin-version.sh "${{ inputs.version }}"

      - name: Validate plugin configuration
        run: |
          claude plugin validate .
          claude plugin validate plugins/budi-hooks

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create publish pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ env.PUBLISH_TOKEN }}
          base: ${{ inputs.base_branch }}
          branch: ci/publish-marketplace-v${{ inputs.version }}
          delete-branch: true
          title: "chore: publish budi-hooks v${{ inputs.version }}"
          commit-message: "chore: publish budi-hooks v${{ inputs.version }}"
          body: |
            Automated marketplace publish PR.

            ## Included
            - bump `budi-hooks` plugin version
            - bump marketplace plugin entry version
            - run plugin validation checks

            Triggered by: `${{ github.workflow }}`.

      - name: No changes summary
        if: steps.changes.outputs.changed != 'true'
        run: |
          echo "No changes detected after version bump; nothing to publish."
