name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (example: v2.0.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify_tag_version:
    name: Verify tag matches Cargo version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate tag and workspace version
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          expected_version="${RELEASE_TAG#v}"
          actual_version="$(awk -F'\"' '/^version = \"[0-9]+\.[0-9]+\.[0-9]+\"$/ {print $2; exit}' Cargo.toml)"
          if [[ -z "${actual_version}" ]]; then
            echo "::error::Unable to read workspace version from Cargo.toml"
            exit 1
          fi
          echo "release_tag=${RELEASE_TAG}"
          echo "workspace_version=${actual_version}"
          if [[ "${actual_version}" != "${expected_version}" ]]; then
            echo "::error::Tag ${RELEASE_TAG} does not match Cargo version ${actual_version}. Expected tag v${actual_version}."
            exit 1
          fi

  build-assets:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    needs: verify_tag_version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: x86_64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
            asset: aarch64-apple-darwin
          - os: macos-14
            target: x86_64-apple-darwin
            asset: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binaries
        shell: bash
        run: |
          cargo build \
            --manifest-path Cargo.toml \
            --profile release \
            --locked \
            --target "${{ matrix.target }}" \
            --bin budi \
            --bin budi-daemon

      - name: Package tarball
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          target="${{ matrix.target }}"
          package="budi-${tag}-${target}"
          stage_dir="${RUNNER_TEMP}/${package}"

          mkdir -p "${stage_dir}"
          ext=""
          if [[ "$target" == *windows* ]]; then ext=".exe"; fi
          cp "target/${target}/release/budi${ext}" "${stage_dir}/"
          cp "target/${target}/release/budi-daemon${ext}" "${stage_dir}/"
          cp README.md "${stage_dir}/"

          if [[ "$target" == *windows* ]]; then
            archive="${package}.zip"
            cd "${RUNNER_TEMP}" && 7z a -tzip "${GITHUB_WORKSPACE}/${archive}" "${package}"
            cd "${GITHUB_WORKSPACE}"
          else
            archive="${package}.tar.gz"
            tar -C "${RUNNER_TEMP}" -czf "${archive}" "${package}"
          fi

          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${archive}" > "${archive}.sha256"
          else
            shasum -a 256 "${archive}" > "${archive}.sha256"
          fi

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.asset }}
          path: |
            *.tar.gz
            *.tar.gz.sha256
            *.zip
            *.zip.sha256
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build-assets
    steps:
      - name: Download all packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Build combined checksum file
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz *.zip 2>/dev/null > SHA256SUMS || true

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS

  update-homebrew:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: publish-release
    steps:
      - name: Checkout budi repo
        uses: actions/checkout@v5

      - name: Checkout homebrew-budi tap
        uses: actions/checkout@v5
        with:
          repository: siropkin/homebrew-budi
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          VER="${RELEASE_TAG#v}"

          curl -fsSL "https://github.com/siropkin/budi/releases/download/${RELEASE_TAG}/SHA256SUMS" -o sums

          AARCH64_DARWIN=$(awk '/aarch64-apple-darwin\.tar\.gz$/ {print $1}' sums)
          X86_64_DARWIN=$(awk '/x86_64-apple-darwin\.tar\.gz$/ {print $1}' sums)
          X86_64_LINUX=$(awk '/x86_64-unknown-linux-gnu\.tar\.gz$/ {print $1}' sums)

          if [[ -z "$AARCH64_DARWIN" || -z "$X86_64_DARWIN" || -z "$X86_64_LINUX" ]]; then
            echo "::error::Missing SHA256 checksums in release"
            cat sums
            exit 1
          fi

          mkdir -p homebrew-tap/Formula
          sed \
            -e "s/{{VERSION}}/${VER}/g" \
            -e "s/{{SHA256_AARCH64_DARWIN}}/${AARCH64_DARWIN}/g" \
            -e "s/{{SHA256_X86_64_DARWIN}}/${X86_64_DARWIN}/g" \
            -e "s/{{SHA256_X86_64_LINUX}}/${X86_64_LINUX}/g" \
            homebrew/budi.rb > homebrew-tap/Formula/budi.rb

          echo "Formula updated to v${VER}"
          cat homebrew-tap/Formula/budi.rb

      - name: Push to tap
        working-directory: homebrew-tap
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/budi.rb
          if git diff --cached --quiet; then
            echo "No changes to formula"
          else
            git commit -m "budi ${RELEASE_TAG}"
            git push
          fi
