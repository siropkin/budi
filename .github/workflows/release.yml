name: Release

on:
  push:
    tags:
      # Matches `vMAJOR.MINOR.PATCH` and `vMAJOR.MINOR.PATCH-SUFFIX` (prereleases).
      # Stable tags trigger the full pipeline; prerelease tags (anything with a
      # `-` in the version, e.g. `v8.4.8-rc.1`) publish artifacts as a
      # GitHub "Pre-release" and *skip* the Homebrew tap auto-bump so
      # `brew install siropkin/budi/budi` keeps pointing at the latest stable.
      - "v[0-9]*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (example: v2.0.0 or v2.0.0-rc.1)"
        required: true
        type: string

permissions:
  contents: read
  checks: read

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
  # `true` for prerelease tags (vX.Y.Z-rc.N, vX.Y.Z-beta.N, …). Drives both
  # the GitHub release's `prerelease` flag and the gate on the Homebrew tap
  # update so users on `brew upgrade` never get pulled onto an rc.
  IS_PRERELEASE: ${{ contains((github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name), '-') }}

jobs:
  ci-check:
    name: Verify CI passed
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # fountainhead/action-wait-for-check treats a missing check as "wait" rather
      # than "exit immediately", which avoids the race where ci-success hasn't
      # registered yet on a fresh tag push (see issue #573).
      - name: Wait for CI workflow
        id: wait-ci
        uses: fountainhead/action-wait-for-check@5a908a24814494009c4bb27c242ea38c93c593be # v1.2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.sha }}
          checkName: ci-success
          timeoutSeconds: 1500
          intervalSeconds: 15

      - name: Verify ci-success conclusion
        run: |
          conclusion='${{ steps.wait-ci.outputs.conclusion }}'
          echo "ci-success conclusion: ${conclusion}"
          if [[ "${conclusion}" != "success" ]]; then
            echo "::error::ci-success did not succeed (conclusion=${conclusion})"
            exit 1
          fi

  verify_tag_version:
    name: Verify tag matches Cargo version
    needs: ci-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate tag and workspace version
        shell: bash
        run: |
          set -euo pipefail
          # Strip the `vX.Y.Z` prefix; for prereleases (`vX.Y.Z-rc.N`) also
          # strip the suffix so we only compare the semver base against
          # Cargo.toml. The workspace stays pinned to the *target* stable
          # version across an entire prerelease cycle — bump it once when
          # cutting the first rc, then promote the same SHA to the stable
          # tag at the end.
          expected_version="${RELEASE_TAG#v}"
          expected_base="${expected_version%%-*}"
          actual_version="$(awk -F'\"' '/^version = \"[0-9]+\.[0-9]+\.[0-9]+\"$/ {print $2; exit}' Cargo.toml)"
          if [[ -z "${actual_version}" ]]; then
            echo "::error::Unable to read workspace version from Cargo.toml"
            exit 1
          fi
          echo "release_tag=${RELEASE_TAG}"
          echo "workspace_version=${actual_version}"
          echo "expected_base=${expected_base}"
          echo "is_prerelease=${IS_PRERELEASE}"
          if [[ "${actual_version}" != "${expected_base}" ]]; then
            echo "::error::Tag ${RELEASE_TAG} (base ${expected_base}) does not match Cargo version ${actual_version}. Expected tag v${actual_version} or v${actual_version}-<suffix>."
            exit 1
          fi

  build-assets:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    needs: verify_tag_version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset: aarch64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
            asset: aarch64-apple-darwin
          - os: macos-14
            target: x86_64-apple-darwin
            asset: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: release-${{ matrix.target }}

      - name: Build release binaries
        shell: bash
        run: |
          cargo build \
            --manifest-path Cargo.toml \
            --profile release \
            --locked \
            --target "${{ matrix.target }}" \
            --bin budi \
            --bin budi-daemon

      - name: Package tarball
        shell: bash
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          target="${{ matrix.target }}"
          package="budi-${tag}-${target}"
          stage_dir="${RUNNER_TEMP}/${package}"

          mkdir -p "${stage_dir}"
          ext=""
          if [[ "$target" == *windows* ]]; then ext=".exe"; fi
          cp "target/${target}/release/budi${ext}" "${stage_dir}/"
          cp "target/${target}/release/budi-daemon${ext}" "${stage_dir}/"
          cp README.md "${stage_dir}/"
          cp LICENSE "${stage_dir}/"

          if [[ "$target" == *windows* ]]; then
            archive="${package}.zip"
            cd "${RUNNER_TEMP}" && 7z a -tzip "${GITHUB_WORKSPACE}/${archive}" "${package}"
            cd "${GITHUB_WORKSPACE}"
          else
            archive="${package}.tar.gz"
            tar -C "${RUNNER_TEMP}" -czf "${archive}" "${package}"
          fi

          ARCHIVE_PATH="${GITHUB_WORKSPACE}/${archive}"
          if [[ "$target" != *windows* ]]; then
            ARCHIVE_PATH="${archive}"
          fi

          ARCHIVE_PATH="${ARCHIVE_PATH}" PACKAGE_NAME="${package}" TARGET_TRIPLE="${target}" python - <<'PY'
          import os
          import sys
          import tarfile
          import zipfile

          archive = os.environ["ARCHIVE_PATH"]
          package = os.environ["PACKAGE_NAME"]
          target = os.environ["TARGET_TRIPLE"]

          required = ["README.md", "LICENSE", "budi", "budi-daemon"]
          if "windows" in target:
            required[2] = "budi.exe"
            required[3] = "budi-daemon.exe"

          expected = {f"{package}/{name}" for name in required}
          names: set[str]
          if archive.endswith(".zip"):
            with zipfile.ZipFile(archive, "r") as zf:
              names = set(zf.namelist())
          else:
            with tarfile.open(archive, "r:gz") as tf:
              names = set(tf.getnames())

          missing = sorted(path for path in expected if path not in names)
          if missing:
            print(f"::error::Archive validation failed for {archive}; missing: {', '.join(missing)}")
            sys.exit(1)

          print(f"Archive validation passed for {archive}")
          PY

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.asset }}
          path: |
            *.tar.gz
            *.zip
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build-assets
    permissions:
      contents: write
    steps:
      - name: Download all packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Build combined checksum file
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz > SHA256SUMS
          if ls *.zip 1>/dev/null 2>&1; then
            sha256sum *.zip >> SHA256SUMS
          fi
          cat SHA256SUMS

      - name: Create or update release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          # Tags containing a `-` (rc/beta/alpha suffix) publish as a
          # GitHub "Pre-release" — they keep the "Latest" badge on the
          # most recent stable tag and are excluded from the auto-update
          # discovery path the CLI uses.
          prerelease: ${{ env.IS_PRERELEASE == 'true' }}
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS

  update-homebrew:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: publish-release
    # Prerelease tags don't bump the tap — `brew upgrade siropkin/budi/budi`
    # users stay on the last stable. Promote an rc to a stable tag from the
    # same SHA when it passes smoke and this job will fire then.
    #
    # NB: the `env:` context isn't available in job-level `if:` expressions
    # (only `github.*`, `needs.*`, `inputs.*`, `vars.*`), so we recompute
    # the same `contains(..., '-')` check inline rather than referencing
    # `env.IS_PRERELEASE`.
    if: ${{ !contains((github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name), '-') }}
    steps:
      - name: Checkout budi repo
        uses: actions/checkout@v5

      - name: Checkout homebrew-budi tap
        uses: actions/checkout@v5
        with:
          repository: siropkin/homebrew-budi
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        shell: bash
        run: |
          set -euo pipefail
          VER="${RELEASE_TAG#v}"

          curl -fsSL "https://github.com/siropkin/budi/releases/download/${RELEASE_TAG}/SHA256SUMS" -o sums

          AARCH64_DARWIN=$(awk '/aarch64-apple-darwin\.tar\.gz$/ {print $1}' sums)
          X86_64_DARWIN=$(awk '/x86_64-apple-darwin\.tar\.gz$/ {print $1}' sums)
          X86_64_LINUX=$(awk '/x86_64-unknown-linux-gnu\.tar\.gz$/ {print $1}' sums)
          AARCH64_LINUX=$(awk '/aarch64-unknown-linux-gnu\.tar\.gz$/ {print $1}' sums)

          if [[ -z "$AARCH64_DARWIN" || -z "$X86_64_DARWIN" || -z "$X86_64_LINUX" || -z "$AARCH64_LINUX" ]]; then
            echo "::error::Missing SHA256 checksums in release"
            cat sums
            exit 1
          fi

          mkdir -p homebrew-tap/Formula
          sed \
            -e "s/{{VERSION}}/${VER}/g" \
            -e "s/{{SHA256_AARCH64_DARWIN}}/${AARCH64_DARWIN}/g" \
            -e "s/{{SHA256_X86_64_DARWIN}}/${X86_64_DARWIN}/g" \
            -e "s/{{SHA256_X86_64_LINUX}}/${X86_64_LINUX}/g" \
            -e "s/{{SHA256_AARCH64_LINUX}}/${AARCH64_LINUX}/g" \
            homebrew/budi.rb > homebrew-tap/Formula/budi.rb

          echo "Formula updated to v${VER}"
          cat homebrew-tap/Formula/budi.rb

      - name: Push to tap
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/budi.rb
          if git diff --cached --quiet; then
            echo "No changes to formula"
          else
            git commit -m "budi ${RELEASE_TAG}"
            git push
          fi
