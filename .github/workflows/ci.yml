name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --locked

      - name: Build release binaries
        run: cargo build --workspace --release --locked

      - name: Smoke test binaries
        run: |
          ./target/release/budi --version
          ./target/release/budi-daemon --version

      - name: Integration smoke test (daemon endpoints)
        run: |
          ./target/release/budi-daemon serve --port 19876 &
          DAEMON_PID=$!
          trap 'kill "$DAEMON_PID" 2>/dev/null || true' EXIT
          # Wait for daemon to be ready
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:19876/health >/dev/null 2>&1; then
              break
            fi
            sleep 0.25
          done
          # Test endpoints (daemon has no data in CI, just verify they respond)
          curl -sf http://127.0.0.1:19876/health | jq -e '.ok == true'
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:19876/analytics/summary)
          echo "analytics/summary returned HTTP $HTTP_CODE"
          # Accept 200 (normal) or 500 (empty DB in CI — no data dir)
          test "$HTTP_CODE" = "200" -o "$HTTP_CODE" = "500"
          curl -sf http://127.0.0.1:19876/dashboard | head -c 100 | grep -q '<!DOCTYPE html\|<html'
          echo "All daemon endpoints responded correctly"

      - name: Test install script (from source build)
        run: |
          scripts/install.sh --skip-build --bin-dir "$RUNNER_TEMP/budi-bin" --force --no-path-warn
          "$RUNNER_TEMP/budi-bin/budi" --version
          "$RUNNER_TEMP/budi-bin/budi-daemon" --version

      - name: Test uninstall script
        run: |
          scripts/uninstall.sh --bin-dir "$RUNNER_TEMP/budi-bin" --keep-daemons
          ! test -f "$RUNNER_TEMP/budi-bin/budi"
          ! test -f "$RUNNER_TEMP/budi-bin/budi-daemon"
          echo "Uninstall verified: binaries removed"

  macos-build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build
        run: cargo build --workspace --locked

      - name: Test
        run: cargo test --workspace --locked

      - name: Smoke test binaries
        run: |
          ./target/debug/budi --version
          ./target/debug/budi-daemon --version

      - name: Test install script (from source build)
        run: |
          scripts/install.sh --skip-build --profile dev --bin-dir "$RUNNER_TEMP/budi-bin" --force --no-path-warn
          "$RUNNER_TEMP/budi-bin/budi" --version
          "$RUNNER_TEMP/budi-bin/budi-daemon" --version

      - name: Test uninstall script
        run: |
          scripts/uninstall.sh --bin-dir "$RUNNER_TEMP/budi-bin" --keep-daemons
          ! test -f "$RUNNER_TEMP/budi-bin/budi"
          ! test -f "$RUNNER_TEMP/budi-bin/budi-daemon"
          echo "Uninstall verified: binaries removed"

  windows-build:
    runs-on: windows-latest
    env:
      HOME: ${{ github.workspace }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build
        run: cargo build --workspace --locked

      - name: Test
        run: cargo test --workspace --locked

      - name: Smoke test binaries
        run: |
          .\target\debug\budi.exe --version
          .\target\debug\budi-daemon.exe --version
