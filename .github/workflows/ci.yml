name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Cursor extension dependencies
        run: |
          cd extensions/cursor-budi
          npm ci

      - name: Lint Cursor extension
        run: |
          cd extensions/cursor-budi
          npm run lint

      - name: Check Cursor extension formatting
        run: |
          cd extensions/cursor-budi
          npm run format:check

      - name: Test Cursor extension
        run: |
          cd extensions/cursor-budi
          npm run test

      - name: Build Cursor extension package
        run: |
          cd extensions/cursor-budi
          npm run build
          npx vsce package --no-dependencies -o cursor-budi.vsix
          test -s cursor-budi.vsix

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --locked

      - name: Security audit
        run: |
          cargo install cargo-audit --quiet
          cargo audit

      - name: Build release binaries
        env:
          BUDI_REQUIRE_CURSOR_VSIX: "1"
        run: cargo build --workspace --release --locked

      - name: Smoke test binaries
        run: |
          ./target/release/budi --version
          ./target/release/budi-daemon --version

      - name: Integration smoke test (daemon endpoints)
        env:
          SMOKE_PORT: 19876
        run: |
          ./target/release/budi-daemon serve --port "$SMOKE_PORT" &
          DAEMON_PID=$!
          trap 'kill "$DAEMON_PID" 2>/dev/null || true' EXIT
          for i in $(seq 1 20); do
            if curl -sf "http://127.0.0.1:${SMOKE_PORT}/health" >/dev/null 2>&1; then
              break
            fi
            sleep 0.25
          done
          curl -sf "http://127.0.0.1:${SMOKE_PORT}/health" >/dev/null 2>&1 || {
            echo "::error::Daemon did not become healthy within 5s"
            exit 1
          }
          curl -sf "http://127.0.0.1:${SMOKE_PORT}/health" | jq -e '.ok == true'
          RESPONSE=$(curl -s -w '\n%{http_code}' "http://127.0.0.1:${SMOKE_PORT}/analytics/summary")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          if [ "$HTTP_CODE" = "200" ]; then
            echo "analytics/summary returned 200"
          elif [ "$HTTP_CODE" = "500" ]; then
            echo "$BODY" | jq . >/dev/null 2>&1 || { echo "::error::500 response is not valid JSON: $BODY"; exit 1; }
            echo "analytics/summary returned 500 (empty DB — valid JSON error)"
          else
            echo "::error::analytics/summary returned unexpected HTTP $HTTP_CODE"
            exit 1
          fi
          curl -sf "http://127.0.0.1:${SMOKE_PORT}/dashboard" | head -c 100 | grep -q '<!DOCTYPE html\|<html'
          echo "All daemon endpoints responded correctly"

      - name: Test install script (from source build)
        run: |
          scripts/install.sh --skip-build --bin-dir "$RUNNER_TEMP/budi-bin" --force --no-path-warn
          "$RUNNER_TEMP/budi-bin/budi" --version
          "$RUNNER_TEMP/budi-bin/budi-daemon" --version

      - name: Test uninstall script
        run: |
          scripts/uninstall.sh --bin-dir "$RUNNER_TEMP/budi-bin" --keep-daemons
          ! test -f "$RUNNER_TEMP/budi-bin/budi"
          ! test -f "$RUNNER_TEMP/budi-bin/budi-daemon"
          echo "Uninstall verified: binaries removed"

  macos-build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Lint
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Build
        run: cargo build --workspace --locked

      - name: Test
        run: cargo test --workspace --locked

      - name: Smoke test binaries
        run: |
          ./target/debug/budi --version
          ./target/debug/budi-daemon --version

      - name: Test install script (from source build)
        run: |
          scripts/install.sh --skip-build --profile dev --bin-dir "$RUNNER_TEMP/budi-bin" --force --no-path-warn
          "$RUNNER_TEMP/budi-bin/budi" --version
          "$RUNNER_TEMP/budi-bin/budi-daemon" --version

      - name: Test uninstall script
        run: |
          scripts/uninstall.sh --bin-dir "$RUNNER_TEMP/budi-bin" --keep-daemons
          ! test -f "$RUNNER_TEMP/budi-bin/budi"
          ! test -f "$RUNNER_TEMP/budi-bin/budi-daemon"
          echo "Uninstall verified: binaries removed"

  windows-build:
    runs-on: windows-latest
    env:
      HOME: ${{ github.workspace }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build
        run: cargo build --workspace --locked

      - name: Test
        run: cargo test --workspace --locked

      - name: Smoke test binaries
        run: |
          .\target\debug\budi.exe --version
          .\target\debug\budi-daemon.exe --version

      - name: Validate PowerShell scripts
        shell: pwsh
        run: |
          foreach ($script in @("scripts/install-standalone.ps1", "scripts/uninstall-standalone.ps1")) {
            $errors = $null
            [System.Management.Automation.PSParser]::Tokenize((Get-Content -Raw $script), [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) { throw "Syntax errors in ${script}: $($errors | Out-String)" }
          }
          Write-Host "PowerShell scripts have valid syntax"

  ci-success:
    if: always()
    needs: [rust-checks, macos-build, windows-build]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed
        run: |
          if [[ "${{ needs.rust-checks.result }}" != "success" ]] || \
             [[ "${{ needs.macos-build.result }}" != "success" ]] || \
             [[ "${{ needs.windows-build.result }}" != "success" ]]; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi
          echo "All CI checks passed"
