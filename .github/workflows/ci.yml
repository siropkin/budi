name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --locked

      - name: Security audit
        run: |
          cargo install cargo-audit --quiet
          cargo audit

      - name: Unused dependencies (cargo-machete)
        run: |
          cargo install cargo-machete --locked --quiet
          cargo machete

      - name: Validate shell script syntax
        run: |
          set -euo pipefail
          for script in scripts/*.sh scripts/pricing/*.sh scripts/research/*.sh; do
            [ -f "$script" ] || continue
            bash -n "$script"
          done
          echo "Shell script syntax checks passed"

      - name: Build release binaries
        run: cargo build --workspace --release --locked

      - name: Smoke test binaries
        run: |
          ./target/release/budi --version
          ./target/release/budi-daemon --version

      - name: Help-text cleanliness (no internal issue refs; #495)
        run: |
          set -euo pipefail
          LEAKS=0
          for cmd in \
            "" "stats" "sessions" "status" "statusline" "doctor" "vitals" \
            "update" "uninstall" "integrations" "integrations list" \
            "integrations install" "autostart" "autostart status" \
            "autostart install" "autostart uninstall" "db" "db migrate" \
            "db repair" "db import" "cloud" "cloud init" "cloud status" \
            "cloud sync" "pricing" "pricing status"; do
            OUT=$(./target/release/budi $cmd --help 2>&1 || true)
            # Regex matches internal ticket / ADR refs and Round-N.M labels.
            # Deliberately excludes bare `N.M` version-like strings since
            # release notes legitimately cite `8.3.0` etc.
            if HITS=$(printf '%s\n' "$OUT" | grep -nE '#[0-9]+|ADR-[0-9]+|R[0-9]+\.[0-9]+'); then
              echo "::error::'budi $cmd --help' leaks internal refs:"
              printf '%s\n' "$HITS"
              LEAKS=$((LEAKS + 1))
            fi
          done
          if [ "$LEAKS" -gt 0 ]; then
            echo "::error::$LEAKS help surfaces leak internal refs. Move them to rustdoc."
            exit 1
          fi
          echo "Help text is free of internal issue / ADR references."

      - name: Integration smoke test (daemon endpoints)
        env:
          SMOKE_PORT: 19876
        run: |
          ./target/release/budi-daemon serve --port "$SMOKE_PORT" &
          DAEMON_PID=$!
          trap 'kill "$DAEMON_PID" 2>/dev/null || true' EXIT
          for i in $(seq 1 20); do
            if curl -sf "http://127.0.0.1:${SMOKE_PORT}/health" >/dev/null 2>&1; then
              break
            fi
            sleep 0.25
          done
          curl -sf "http://127.0.0.1:${SMOKE_PORT}/health" >/dev/null 2>&1 || {
            echo "::error::Daemon did not become healthy within 5s"
            exit 1
          }
          curl -sf "http://127.0.0.1:${SMOKE_PORT}/health" | jq -e '.ok == true and .api_version >= 1'
          RESPONSE=$(curl -s -w '\n%{http_code}' "http://127.0.0.1:${SMOKE_PORT}/analytics/summary")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          if [ "$HTTP_CODE" = "200" ]; then
            echo "analytics/summary returned 200"
          elif [ "$HTTP_CODE" = "500" ]; then
            echo "$BODY" | jq . >/dev/null 2>&1 || { echo "::error::500 response is not valid JSON: $BODY"; exit 1; }
            echo "analytics/summary returned 500 (empty DB — valid JSON error)"
          else
            echo "::error::analytics/summary returned unexpected HTTP $HTTP_CODE"
            exit 1
          fi
          echo "All daemon endpoints responded correctly"

      - name: Test install script (from source build)
        run: |
          scripts/install.sh --skip-build --bin-dir "$RUNNER_TEMP/budi-bin" --force --no-path-warn
          "$RUNNER_TEMP/budi-bin/budi" --version
          "$RUNNER_TEMP/budi-bin/budi-daemon" --version

      - name: Test uninstall script
        run: |
          scripts/uninstall.sh --bin-dir "$RUNNER_TEMP/budi-bin" --keep-daemons
          ! test -f "$RUNNER_TEMP/budi-bin/budi"
          ! test -f "$RUNNER_TEMP/budi-bin/budi-daemon"
          echo "Uninstall verified: binaries removed"

  macos-build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Lint
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Build
        run: cargo build --workspace --locked

      - name: Test
        run: cargo test --workspace --locked

      - name: Smoke test binaries
        run: |
          ./target/debug/budi --version
          ./target/debug/budi-daemon --version

      - name: Test install script (from source build)
        run: |
          scripts/install.sh --skip-build --profile dev --bin-dir "$RUNNER_TEMP/budi-bin" --force --no-path-warn
          "$RUNNER_TEMP/budi-bin/budi" --version
          "$RUNNER_TEMP/budi-bin/budi-daemon" --version

      - name: Test uninstall script
        run: |
          scripts/uninstall.sh --bin-dir "$RUNNER_TEMP/budi-bin" --keep-daemons
          ! test -f "$RUNNER_TEMP/budi-bin/budi"
          ! test -f "$RUNNER_TEMP/budi-bin/budi-daemon"
          echo "Uninstall verified: binaries removed"

  windows-build:
    runs-on: windows-latest
    env:
      HOME: ${{ github.workspace }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build
        run: cargo build --workspace --locked

      - name: Test
        run: cargo test --workspace --locked

      - name: Smoke test binaries
        run: |
          .\target\debug\budi.exe --version
          .\target\debug\budi-daemon.exe --version

      - name: Validate PowerShell scripts
        shell: pwsh
        run: |
          foreach ($script in @("scripts/install-standalone.ps1", "scripts/uninstall-standalone.ps1")) {
            $errors = $null
            [System.Management.Automation.PSParser]::Tokenize((Get-Content -Raw $script), [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) { throw "Syntax errors in ${script}: $($errors | Out-String)" }
          }
          Write-Host "PowerShell scripts have valid syntax"

  # Supply-chain policy check (issue #409, R3.5 audit F-3).
  #
  # Runs `cargo deny check` against `deny.toml`. Non-blocking for now so we
  # can land the policy file and observe one clean release cycle before
  # promoting the job to a required status check. Treat any failure seen
  # here as a real signal, not noise.
  supply-chain:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # #536: EmbarkStudios/cargo-deny-action@v2.0.17 was failing on every
      # PR with `failed to get 'FETCH_HEAD' metadata` — the action's internal
      # gix-based advisory-db cache didn't exist on fresh runners and
      # couldn't be bootstrapped. Install cargo-deny directly via cargo
      # instead; its own advisory-db fetch handles the `~/.cargo/advisory-db`
      # path correctly (same path cargo-audit uses in the rust-checks job).
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run cargo-deny
        run: cargo deny --all-features check

  # Unused-dependency scan via `cargo udeps` (issue #808).
  #
  # Requires the nightly toolchain. Allowed to fail initially so nightly
  # flakiness doesn't block PRs; the warning still shows up on the Checks
  # tab. Promote to a required check once a few clean runs have landed.
  udeps:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust nightly toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install cargo-udeps
        run: cargo install cargo-udeps --locked

      - name: Run cargo-udeps
        run: cargo +nightly udeps --workspace --all-targets

  ci-success:
    if: always()
    needs: [rust-checks, macos-build, windows-build]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed
        run: |
          if [[ "${{ needs.rust-checks.result }}" != "success" ]] || \
             [[ "${{ needs.macos-build.result }}" != "success" ]] || \
             [[ "${{ needs.windows-build.result }}" != "success" ]]; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi
          echo "All CI checks passed"
